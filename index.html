<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Súper Control RT Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
		/* Margen extra inferior para que el contenido no quede detrás de la nav-bar */
        .view-section { padding-bottom: 140px; } 
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Efecto de difuminado para la barra de navegación */
        .nav-blur {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] pb-6">
        <button onclick="switchView('viewCaratulas')" class="nav-btn flex flex-col items-center text-indigo-600" id="btn-nav-compras">
            <i data-lucide="layout-list"></i><span class="text-[10px] font-bold">COMPRAS</span>
            <!-- <br><br> -->
        </button>
        <button onclick="switchView('viewHistorial')" class="nav-btn flex flex-col items-center text-slate-400" id="btn-nav-historial">
            <i data-lucide="history"></i><span class="text-[10px] font-bold">HISTORIAL</span>
        </button>
        <button onclick="switchView('viewDash')" class="nav-btn flex flex-col items-center text-slate-400" id="btn-nav-dash">
            <i data-lucide="bar-chart-3"></i><span class="text-[10px] font-bold">ANÁLISIS</span>
        </button>
    </nav>

    <div id="viewCaratulas" class="view-section">
        <header class="bg-indigo-700 text-white p-6 rounded-b-[2rem] shadow-lg">
            <h1 class="text-xl font-black mb-2">📋 MIS COMPRAS</h1>
            <p class="text-xs text-indigo-200">Gestiona múltiples listas de supermercado</p>
        </header>

        <main class="p-4">
            <button onclick="abrirModalCaratula()" class="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-lg flex justify-center items-center gap-2 mb-6 active:scale-95 transition-all">
                <i data-lucide="plus-circle"></i> CREAR CARÁTULA DE COMPRA
            </button>

            <div class="mb-4">
                <input type="text" id="searchCaratulas" oninput="renderCaratulas()" placeholder="Buscar supermercado..." class="w-full p-3 rounded-xl border border-slate-200 text-sm">
            </div>

            <div id="lista_caratulas" class="space-y-4">
                </div>
        </main>
    </div>

    <div id="viewCompra" class="view-section hidden">
        <header class="bg-indigo-700 text-white py-3 px-4 rounded-b-[2rem] shadow-lg sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <button onclick="switchView('viewCaratulas')" class="p-2 bg-indigo-600 rounded-lg active:scale-90 transition-transform">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>
                <div class="flex-1 min-w-0">
                    <h1 id="header_supermercado" class="text-base font-black leading-tight truncate uppercase tracking-tight"></h1>
                    <p id="header_descripcion" class="text-[10px] text-indigo-200 truncate opacity-80"></p>
                </div>
                
                <div class="bg-slate-900/40 backdrop-blur-md px-4 py-1.5 rounded-2xl border border-white/10 shadow-lg text-right">
                    <p class="text-[8px] font-bold text-indigo-200 uppercase leading-none mb-0.5">Total</p>
                    <p id="total_compra" class="text-lg font-black text-yellow-400 leading-none">Q 0.00</p>
                </div>
            </div>
        </header>

        <main class="p-4 max-w-lg mx-auto">
            <section class="bg-white p-5 rounded-[2rem] shadow-sm mb-6 border border-slate-200">
                <div class="space-y-4">
                    <!-- <div class="relative">
                        <input type="text" id="prod_nombre" list="historial_productos" 
                            autocomplete="off"
                            oninput="normalizarInput(this); buscarEnHistorial(this.value)" 
                            placeholder="Nombre del producto..." 
                            class="w-full p-4 bg-slate-100 rounded-2xl text-lg font-bold focus:ring-2 focus:ring-indigo-400 outline-none">
                        <datalist id="historial_productos"></datalist>
                    </div> -->
                    <div class="relative">
                        <input type="text" id="prod_nombre" 
                            autocomplete="off"
                            oninput="normalizarInput(this); buscarEnHistorialCustom(this.value)" 
                            placeholder="Nombre del producto..." 
                            class="w-full p-4 bg-slate-100 rounded-2xl text-lg font-bold focus:ring-2 focus:ring-indigo-400 outline-none">
                        <!-- Nueva lista de sugerencias personalizada -->
                        <div id="sugerencias_container" class="hidden absolute left-0 right-0 top-full mt-1 bg-white border border-slate-200 shadow-xl rounded-2xl z-[60] overflow-hidden"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Cantidad</label>
                            <input type="number" id="prod_cantidad" value="1" class="w-full p-4 bg-slate-100 rounded-2xl text-xl font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Peso/Medida</label>
                            <input type="text" id="prod_peso" oninput="normalizarInput(this)" placeholder="Ej: 1 Litro" class="w-full p-4 bg-slate-100 rounded-2xl text-lg">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 bg-indigo-50 p-4 rounded-2xl items-center border border-indigo-100">
                        <div>
                            <label class="text-[10px] font-bold text-indigo-400 ml-1 uppercase">Precio Unitario</label>
                            <input type="number" id="prod_precio" placeholder="0.00" class="bg-transparent border-none text-2xl font-black text-indigo-700 w-full focus:ring-0 p-0">
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-indigo-400 uppercase">Subtotal</p>
                            <p id="prod_subtotal" class="text-2xl font-black text-indigo-800 leading-none">Q 0.00</p>
                        </div>
                    </div>

                    <button id="btn_accion_prod" onclick="agregarALista()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg flex justify-center items-center gap-2 active:scale-95 transition-all">
                        <i data-lucide="plus"></i> AGREGAR PRODUCTO
                    </button>
                </div>
            </section>

            <div class="mb-6">
                <input type="text" id="searchProductosActuales" oninput="normalizarInput(this); renderProductos()" placeholder="Filtrar en esta lista..." class="w-full p-4 rounded-2xl border-none shadow-inner bg-white text-sm focus:ring-2 focus:ring-slate-200">
                <!-- <input type="text" id="searchProductosActuales" oninput="renderProductos()" placeholder="Filtrar en esta lista..." class="w-full p-4 rounded-2xl border-none shadow-inner bg-white text-sm focus:ring-2 focus:ring-slate-200"> -->
            </div>

            <div id="lista_contenedor" class="space-y-3"></div>
        </main>
    </div>

    <div id="viewHistorial" class="view-section hidden p-4">
        <h2 class="text-2xl font-black text-slate-800 mb-4 flex items-center gap-2">
            <i data-lucide="search" class="text-indigo-600"></i> Consultar Datos
        </h2>
        
        <div class="space-y-4 mb-6">
            <input type="text" id="hist_search_general" oninput="filtrarHistorial()" placeholder="Buscar producto, súper o fecha..." class="w-full p-4 rounded-2xl border-none shadow-sm bg-white">
        </div>

        <div id="cont_historial_agrupado" class="space-y-4">
        </div>
        <br><br><br><br><br>
    </div>

    <div id="viewDash" class="view-section hidden p-4">
        <h2 class="text-2xl font-black text-slate-800 mb-6">📊 Análisis de Precios</h2>
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6">
            <input type="text" id="dash_buscar" oninput="filtrarChecks(this.value)" placeholder="Filtrar productos..." class="w-full p-2 bg-slate-100 rounded-lg text-sm mb-3">
            <div id="contenedor_checks" class="h-32 overflow-y-auto border-t pt-2 grid grid-cols-1 gap-1 hide-scroll"></div>
            <button onclick="updateCharts()" class="w-full mt-3 bg-indigo-500 text-white font-bold py-3 rounded-xl">GENERAR ANÁLISIS</button>
        </div>
        <div class="space-y-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm h-64"><canvas id="chartLineal"></canvas></div>
            <div class="bg-white p-4 rounded-2xl shadow-sm h-64"><canvas id="chartColumnas"></canvas></div>
            <br><br><br><br>
        </div>
    </div>

    <div id="modalCaratula" class="fixed inset-0 z-[100] modal-overlay hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 id="modal_titulo" class="text-xl font-black mb-4">Nueva Carátula</h3>
            <div class="space-y-4">
                <input type="text" id="modal_super" oninput="normalizarInput(this)" placeholder="Nombre del Súper" class="w-full p-4 bg-slate-100 rounded-2xl font-bold">
                <input type="text" id="modal_desc" oninput="normalizarInput(this)" placeholder="Descripción corta" class="w-full p-4 bg-slate-100 rounded-2xl">
                <div class="flex gap-3 pt-4">
                    <button onclick="cerrarModal()" class="flex-1 py-4 font-bold text-slate-400">CANCELAR</button>
                    <button id="btn_guardar_caratula" onclick="guardarCaratula()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black">CREAR</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalConfirmar" class="fixed inset-0 z-[200] modal-overlay hidden flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl mb-20 sm:mb-0">
            <div id="confirm_icon" class="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4"></div>
            <h3 id="confirm_titulo" class="text-xl font-black mb-2"></h3>
            <p id="confirm_msj" class="text-slate-500 mb-8"></p>
            <div class="flex flex-col gap-3">
                <button id="confirm_btn_si" class="w-full py-4 rounded-2xl font-black text-white shadow-lg"></button>
                <button onclick="cerrarConfirm()" class="w-full py-4 font-bold text-slate-400">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzj9DzJvxfdmRhSnTQ_iaZCr9-G9kZXafP06xgnlWJmG1kCqTYzaLHB4Lxq3Q0u_xIs/exec'; 
        let caratulasActivas = [];
        let idCaratulaActual = null;
        let historialDB = [];
        let editandoId = null;
        let editandoCaratulaId = null;
        let chartL = null, chartC = null;

        lucide.createIcons();

        // --- SISTEMA DE NAVEGACIÓN ---
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-indigo-600', 'text-slate-400'));
            
            document.getElementById(viewId).classList.remove('hidden');
            
            const map = { 'viewCaratulas': 'btn-nav-compras', 'viewHistorial': 'btn-nav-historial', 'viewDash': 'btn-nav-dash' };
            if(map[viewId]) document.getElementById(map[viewId]).classList.replace('text-slate-400', 'text-indigo-600');
            
            if(viewId === 'viewDash') initDash();
            if(viewId === 'viewHistorial') loadData();
        }

        // --- GESTIÓN DE CARÁTULAS ---
        function abrirModalCaratula(id = null) {
            editandoCaratulaId = id;
            if(id) {
                const c = caratulasActivas.find(x => x.id === id);
                document.getElementById('modal_super').value = c.supermercado;
                document.getElementById('modal_desc').value = c.descripcion;
                document.getElementById('modal_titulo').innerText = "Editar Carátula";
                document.getElementById('btn_guardar_caratula').innerText = "ACTUALIZAR";
            } else {
                document.getElementById('modal_super').value = "";
                document.getElementById('modal_desc').value = "";
                document.getElementById('modal_titulo').innerText = "Nueva Carátula";
                document.getElementById('btn_guardar_caratula').innerText = "CREAR";
            }
            document.getElementById('modalCaratula').classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modalCaratula').classList.add('hidden'); }

        function guardarCaratula() {
		    // Aplicamos .trim() aquí, justo antes de guardar en el array
		    const s = document.getElementById('modal_super').value.trim();
		    const d = document.getElementById('modal_desc').value.trim();
		    
		    if(!s) return alert("Escribe el nombre del súper");
		
		    if(editandoCaratulaId) {
		        caratulasActivas = caratulasActivas.map(c => c.id === editandoCaratulaId ? {...c, supermercado: s, descripcion: d} : c);
		    } else {
		        caratulasActivas.push({ id: Date.now(), supermercado: s, descripcion: d, productos: [] });
		    }
		    
		    saveLocalStorage();
		    renderCaratulas();
		    cerrarModal();
		}

        function entrarACompra(id) {
            idCaratulaActual = id;
            const c = caratulasActivas.find(x => x.id === id);
            document.getElementById('header_supermercado').innerText = c.supermercado;
            document.getElementById('header_descripcion').innerText = c.descripcion || "Sin descripción";
            renderProductos();
            switchView('viewCompra');
        }

        // --- GESTIÓN DE PRODUCTOS ---
        function agregarALista() {
            const pNombre = document.getElementById('prod_nombre').value;
            const pPrecio = parseFloat(document.getElementById('prod_precio').value);
            if(!pNombre || isNaN(pPrecio)) return alert("Nombre y Precio son obligatorios");

            const caratula = caratulasActivas.find(c => c.id === idCaratulaActual);
            const data = {
                id: editandoId || Date.now(),
                nombre: pNombre,
                cantidad: parseFloat(document.getElementById('prod_cantidad').value) || 1,
                peso: document.getElementById('prod_peso').value,
                precio: pPrecio,
                subtotal: (parseFloat(document.getElementById('prod_cantidad').value) || 1) * pPrecio
            };

            if(editandoId) {
                caratula.productos = caratula.productos.map(p => p.id === editandoId ? data : p);
                resetProdForm();
            } else {
                caratula.productos.unshift(data);
            }

            saveLocalStorage();
            renderProductos();
            limpiarProdForm();
        }

        // --- RENDERIZADO ---
        // Pequeño ajuste en renderCaratulas para consistencia visual
        function renderCaratulas() {
            const query = document.getElementById('searchCaratulas').value.toLowerCase();
            const cont = document.getElementById('lista_caratulas');
            cont.innerHTML = "";

            caratulasActivas.filter(c => c.supermercado.toLowerCase().includes(query)).forEach(c => {
                const total = c.productos.reduce((acc, p) => acc + p.subtotal, 0);
                cont.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                        <div onclick="entrarACompra(${c.id})" class="p-6 active:bg-slate-50 transition-colors">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-black text-indigo-900 text-lg uppercase tracking-tighter">${c.supermercado}</h3>
                                <span class="bg-indigo-100 text-indigo-700 text-[10px] font-black px-3 py-1 rounded-full">${c.productos.length} PRODS</span>
                            </div>
                            <p class="text-xs text-slate-500 mb-4">${c.descripcion || 'Sin descripción'}</p>
                            <p class="text-2xl font-black text-emerald-600">Q ${total.toFixed(2)}</p>
                        </div>
                        <div class="bg-slate-50 p-4 flex flex-col gap-3 border-t border-slate-100">
                            <button onclick="confirmarEnvio()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black flex justify-center items-center gap-2 shadow-md active:scale-95 transition-all">
                                <i data-lucide="send" class="w-4"></i> GUARDAR EN LA NUBE
                            </button>
                            
                            <button onclick="descargarExcel(${c.id})" class="w-full bg-emerald-600 text-white py-3 rounded-2xl font-black flex justify-center items-center gap-2 shadow-md active:scale-95 transition-all text-sm">
                                <i data-lucide="download" class="w-4"></i> DESCARGAR EXCEL (LOCAL)
                            </button>
                            <div class="flex gap-2">
                                <button onclick="abrirModalCaratula(${c.id})" class="flex-1 flex justify-center py-2 text-blue-500 font-bold text-xs uppercase"><i data-lucide="edit" class="w-4 mr-1"></i> Editar</button>
                                <button onclick="pedirConfirmacion('eliminarCaratula', ${c.id})" class="flex-1 flex justify-center py-2 text-red-500 font-bold text-xs uppercase"><i data-lucide="trash-2" class="w-4 mr-1"></i> Borrar</button>
                            </div>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }

        function renderProductos() {
            const query = limpiarTexto(document.getElementById('searchProductosActuales').value);
            const caratula = caratulasActivas.find(c => c.id === idCaratulaActual);
            const cont = document.getElementById('lista_contenedor');
            cont.innerHTML = "";
            let t = 0;

            caratula.productos.forEach(p => {
                if(limpiarTexto(p.nombre).includes(query)) {
                    t += p.subtotal;
                    cont.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100">
                            <div class="flex-1">
                                <p class="font-black text-sm">${p.nombre}</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">${p.cantidad} x Q${p.precio} | ${p.peso}</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <p class="font-black text-indigo-600 text-sm">Q${p.subtotal.toFixed(2)}</p>
                                <button onclick="editarProducto(${p.id})" class="text-blue-400 p-2"><i data-lucide="edit-3" class="w-4"></i></button>
                                <button onclick="pedirConfirmacion('eliminarProducto', ${p.id})" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-4"></i></button>
                            </div>
						</div>`;
                }
            });
            document.getElementById('total_compra').innerText = `Q ${t.toFixed(2)}`;
            lucide.createIcons();
        }

        // --- SISTEMA DE CONFIRMACIÓN ---
        let accionPendiente = null;
        let idPendiente = null;

        function pedirConfirmacion(accion, id) {
            accionPendiente = accion;
            idPendiente = id;
            const modal = document.getElementById('modalConfirmar');
            const icon = document.getElementById('confirm_icon');
            const titulo = document.getElementById('confirm_titulo');
            const msj = document.getElementById('confirm_msj');
            const btn = document.getElementById('confirm_btn_si');

            if(accion === 'eliminarCaratula') {
                icon.className = "mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-red-100 text-red-600";
                icon.innerHTML = '<i data-lucide="alert-triangle"></i>';
                titulo.innerText = "¿Eliminar Compra?";
                msj.innerText = "Se perderán todos los productos agregados a esta carátula.";
                btn.className = "w-full py-4 rounded-2xl font-black text-white shadow-lg bg-red-500";
                btn.innerText = "SÍ, ELIMINAR";
                btn.onclick = () => { caratulasActivas = caratulasActivas.filter(c => c.id !== id); saveLocalStorage(); renderCaratulas(); cerrarConfirm(); };
            } else if(accion === 'enviar') {
                icon.className = "mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-indigo-100 text-indigo-600";
                icon.innerHTML = '<i data-lucide="send"></i>';
                titulo.innerText = "¿Enviar a la Nube?";
                msj.innerText = "Esta acción guardará permanentemente los datos en Google Sheets.";
                btn.className = "w-full py-4 rounded-2xl font-black text-white shadow-lg bg-indigo-600";
                btn.innerText = "SÍ, GUARDAR TODO";
                btn.onclick = enviarAGoogleSheets;
            } else if(accion === 'eliminarProducto') {
                // Eliminación directa para no ser tan intrusivo en productos
                const caratula = caratulasActivas.find(c => c.id === idCaratulaActual);
                caratula.productos = caratula.productos.filter(p => p.id !== id);
                saveLocalStorage(); renderProductos(); cerrarConfirm(); return;
            }
            
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function cerrarConfirm() { document.getElementById('modalConfirmar').classList.add('hidden'); }

        // --- ENVÍO DE DATOS (MANTENIENDO LÓGICA ORIGINAL) ---
        async function enviarAGoogleSheets() {
            const caratula = caratulasActivas.find(c => c.id === idCaratulaActual);
            if(!caratula || caratula.productos.length === 0) return alert("No hay productos");

            cerrarConfirm();
            const btn = document.querySelector('[onclick="confirmarEnvio()"]');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin mr-2">⏳</span> ENVIANDO...';

            const m = new Date().toLocaleString('es-GT', {month: 'long'}).toUpperCase();
            const f = new Date().toISOString().split('T')[0];

            try {
                for (let p of caratula.productos) {
                    const params = new URLSearchParams();
                    params.append('FECHA', f); params.append('MES', m);
                    params.append('DESCRIPCION', caratula.descripcion);
                    params.append('SUPERMERCADO', caratula.supermercado);
                    params.append('CANTIDAD', p.cantidad); params.append('NOMBRE', p.nombre);
                    params.append('PESO_O_TAMANO', p.peso); params.append('PRECIO', p.precio);
                    params.append('SUBTOTAL', p.subtotal);
                    await fetch(SCRIPT_URL, { method: 'POST', body: params });
                }
                alert("¡Compra guardada con éxito!");
                caratulasActivas = caratulasActivas.filter(c => c.id !== idCaratulaActual);
                saveLocalStorage();
                switchView('viewCaratulas');
                renderCaratulas();
                loadData(); // Recargar historial
            } catch (e) {
                alert("Error al enviar. Verifica tu conexión.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }
        
		function descargarExcel(id) {
            // 1. Validar que la librería esté cargada
            if (typeof XLSX === 'undefined') {
                return alert("La librería de Excel aún se está cargando. Intenta de nuevo en un segundo.");
            }

            const c = caratulasActivas.find(x => x.id === id);
            if (!c || c.productos.length === 0) return alert("No hay productos para exportar");

            // 2. Preparar los datos
            const dataParaExcel = c.productos.map(p => ({
                Supermercado: c.supermercado,
                Producto: p.nombre,
                Cantidad: p.cantidad,
                Medida: p.peso,
                Precio_Unitario: p.precio,
                Subtotal: p.subtotal
            }));

            // 3. Crear el libro de trabajo (Workbook)
            const ws = XLSX.utils.json_to_sheet(dataParaExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Lista de Compra");

            // 4. Generar el archivo compatible con móviles
            // Generamos un buffer binario
            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            
            // Creamos un Blob con el tipo de contenido correcto para Excel
            const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            
            // Definimos el nombre del archivo
            const fecha = new Date().toISOString().split('T')[0];
            const nombreArchivo = `Compra_${c.supermercado.replace(/\s+/g, '_')}_${fecha}.xlsx`;

            // 5. Método de descarga universal (PC y Móvil)
            if (navigator.msSaveBlob) {
                // Compatibilidad para Internet Explorer antiguo
                navigator.msSaveBlob(blob, nombreArchivo);
            } else {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                document.body.appendChild(a);
                a.style = "display: none";
                a.href = url;
                a.download = nombreArchivo;
                
                // Simular clic para iniciar descarga
                a.click();
                
                // Limpiar memoria
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }
        }

        // --- HISTORIAL Y BUSQUEDA GENERAL ---
        function filtrarHistorial() {
            const v = document.getElementById('hist_search_general').value.toLowerCase();
            const cont = document.getElementById('cont_historial_agrupado');
            
            // Agrupar historialDB por Fecha + Supermercado para simular carátulas
            const grupos = {};
            historialDB.forEach(r => {
                const key = `${r.FECHA} | ${r.SUPERMERCADO}`;
                if(!grupos[key]) grupos[key] = [];
                grupos[key].push(r);
            });

            cont.innerHTML = "";
            Object.keys(grupos).forEach(key => {
                const prods = grupos[key];
                const matches = prods.filter(p => 
                    p.NOMBRE.toLowerCase().includes(v) || 
                    p.SUPERMERCADO.toLowerCase().includes(v) ||
                    p.FECHA.includes(v)
                );

                if(matches.length > 0) {
                    const total = matches.reduce((a, b) => a + parseFloat(b.SUBTOTAL), 0);
                    cont.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
                            <div class="bg-slate-50 p-4 border-b">
                                <p class="text-[10px] font-black text-indigo-500 uppercase">${key.split('|')[0]}</p>
                                <h4 class="font-black text-slate-800">${key.split('|')[1]}</h4>
                            </div>
                            <div class="p-4 space-y-2">
                                ${matches.map(m => `
                                    <div class="flex justify-between text-xs border-b border-dashed pb-1">
                                        <span>${m.NOMBRE} (Cant. ${m.CANTIDAD})</span>
                                        <span class="font-bold">Q${parseFloat(m.SUBTOTAL).toFixed(2)}</span>
                                    </div>
                                `).join('')}
                                <p class="text-right font-black text-indigo-600 pt-2">Q ${total.toFixed(2)}</p>
                            </div>
                        </div>`;
                }
            });
        }

        function limpiarTexto(texto) {
		    // Eliminamos .trim() para permitir espacios intermedios y finales durante la escritura
		    return texto.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
		}
        function normalizarInput(input) {
            let cursor = input.selectionStart;
            input.value = limpiarTexto(input.value);
            input.setSelectionRange(cursor, cursor);
        }

            document.getElementById('prod_nombre').value = "";
            document.getElementById('prod_precio').value = "";
            document.getElementById('prod_cantidad').value = 1;
            document.getElementById('prod_peso').value = "";
            document.getElementById('prod_subtotal').innerText = "Q 0.00";

        function editarProducto(id) {
            const caratula = caratulasActivas.find(c => c.id === idCaratulaActual);
            const p = caratula.productos.find(x => x.id === id);
            editandoId = id;
            document.getElementById('prod_nombre').value = p.nombre;
            document.getElementById('prod_cantidad').value = p.cantidad;
            document.getElementById('prod_peso').value = p.peso;
            document.getElementById('prod_precio').value = p.precio;
            document.getElementById('prod_subtotal').innerText = `Q ${p.subtotal.toFixed(2)}`;

            document.getElementById('btn_accion_prod').classList.replace('bg-indigo-600', 'bg-orange-500');
            lucide.createIcons();
        }

        function resetProdForm() {
            editandoId = null;
            document.getElementById('btn_accion_prod').innerHTML = '<i data-lucide="plus"></i> AGREGAR';

        // --- LÓGICA DE CÁLCULO EN VIVO ---
        const iCant = document.getElementById('prod_cantidad');
        const iPrecio = document.getElementById('prod_precio');
        [iCant, iPrecio].forEach(inp => inp.addEventListener('input', () => {
            const c = parseFloat(iCant.value) || 0;
            const p = parseFloat(iPrecio.value) || 0;
            document.getElementById('prod_subtotal').innerText = `Q ${(c * p).toFixed(2)}`;
        }));

        async function loadData() {
            try {
                const resp = await fetch(`${SCRIPT_URL}?accion=obtenerDatos`);
                const result = await resp.json();
                if (result.success) {
                    historialDB = result.datos.reverse();
                    filtrarHistorial();
                    poblarChecks();
                }
            } catch (e) { console.error("Error cargando historial", e); }

        function buscarEnHistorialCustom(valor) {
            const cont = document.getElementById('sugerencias_container');
            cont.innerHTML = "";
            
            if (!valor || valor.length < 1) {
                cont.classList.add('hidden');
                return;
            }

            const term = limpiarTexto(valor);
            const matches = historialDB.filter(p => limpiarTexto(p.NOMBRE).includes(term));
            const uniqueNames = [...new Set(matches.map(m => m.NOMBRE))].slice(0, 5);

            if (uniqueNames.length > 0) {
                cont.classList.remove('hidden');
                uniqueNames.forEach(n => {
                    const div = document.createElement('div');
                    div.className = "p-4 border-b border-slate-100 active:bg-indigo-100 font-bold text-slate-700 cursor-pointer";
                    div.innerText = n;
                    div.onclick = () => {
                        document.getElementById('prod_nombre').value = n;
                        cont.classList.add('hidden');
                        // Auto-completar datos si existen
                        const rec = historialDB.find(p => p.NOMBRE === n);
                        if(rec) {
                            document.getElementById('prod_peso').value = rec.PESO_O_TAMANO || "";
                            document.getElementById('prod_precio').value = rec.PRECIO || "";
                            iPrecio.dispatchEvent(new Event('input'));
                        }
                    };
                    cont.appendChild(div);
                });
            } else {
                cont.classList.add('hidden');
            }
        }

        // --- GRÁFICAS (MANTENIENDO TU LÓGICA CORREGIDA) ---
        function initDash() { if (historialDB.length > 0) poblarChecks(); }

        function poblarChecks() {
            const unicos = [...new Set(historialDB.map(p => p.NOMBRE))];
            const cont = document.getElementById('contenedor_checks');
            cont.innerHTML = unicos.map(n => `
                <label class="item-check flex items-center gap-2 text-xs p-2 hover:bg-indigo-50 rounded-lg">
                    <input type="checkbox" value="${n}" class="prod-check"> ${n}
                </label>
            `).join('');
        }

        function filtrarChecks(v) {
            document.querySelectorAll('.item-check').forEach(l => {
                l.classList.toggle('hidden', !l.innerText.toLowerCase().includes(v.toLowerCase()));
            });
        }

        function updateCharts() {
            const seleccionados = Array.from(document.querySelectorAll('.prod-check:checked')).map(i => i.value);
            if (seleccionados.length === 0) return alert("Selecciona productos");

            const todasLasFechas = [...new Set(historialDB.map(p => p.FECHA))].sort((a, b) => new Date(a) - new Date(b));
            const datasetsLineal = seleccionados.map(prodNombre => {
                const registros = historialDB.filter(p => p.NOMBRE === prodNombre);
                return {
                    label: prodNombre,
                    data: todasLasFechas.map(f => {
                        const c = registros.find(r => r.FECHA === f);
                        return c ? parseFloat(c.PRECIO) : null;
                    }),
                    borderColor: `hsl(${Math.random() * 360}, 70%, 50%)`,
                    spanGaps: true, tension: 0.3
                };
            });

            if (chartL) chartL.destroy();
            chartL = new Chart(document.getElementById('chartLineal'), {
                type: 'line',
                data: { labels: todasLasFechas, datasets: datasetsLineal },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const promedios = seleccionados.map(n => {
                const c = historialDB.filter(p => p.NOMBRE === n);
                return (c.reduce((a, b) => a + parseFloat(b.PRECIO), 0) / c.length).toFixed(2);
            });

            if (chartC) chartC.destroy();
            chartC = new Chart(document.getElementById('chartColumnas'), {
                type: 'bar',
                data: { labels: seleccionados, datasets: [{ label: 'Precio Promedio', data: promedios, backgroundColor: '#4f46e5' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
            cont.innerHTML += ``;
        }

            loadData();
